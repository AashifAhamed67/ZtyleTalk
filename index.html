<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>ZtyleTalk</title>

  <link rel="stylesheet" href="style.css">
</head>

<body>

<h1>ZtyleTalk</h1>

<input
type="text"
id="name"
placeholder="Your Name">

<br><br>

<input
type="file"
id="pic">

<br><br>

<img
id="preview"
width="80"
style="display:none;border-radius:50%;">

<br><br>

<button onclick="createAccount()">
Create Account
</button>

<h2 id="code"></h2>

<hr>

<h2>Contacts</h2>

<input
type="number"
id="contactCode"
placeholder="Enter 6 Digit Code">

<button onclick="addContact()">
Add Contact
</button>

<div id="contactsList"></div>

<hr>

<h2>Chat</h2>

<div id="chat"
style="
height:250px;
overflow:auto;
background:#111827;
padding:10px;
border-radius:10px;
margin-bottom:10px;
">

</div>

<input
type="text"
id="message"
placeholder="Type message">

<button onclick="sendMessage()">
Send
</button>

<script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>

<script src="script.js"></script>

</body>
<script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
</html>
